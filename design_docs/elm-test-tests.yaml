    - name: Case with single variable pattern
      elm_source: |
        module Test exposing (testValue)
        testValue =
            let x = 42
            in case x of
                y -> y
    - name: Case with two branches
      elm_source: |
        module Test exposing (testValue)
        testValue =
            let x = 1
            in case x of
                0 -> "zero"
                _ -> "other"
    - name: Case with three branches
      elm_source: |
        module Test exposing (testValue)
        testValue =
            let x = 1
            in case x of
                0 -> "zero"
                1 -> "one"
                _ -> "other"
    - name: Case returning complex expression
      elm_source: |
        module Test exposing (testValue)
        testValue =
            let x = 42
            in case x of
