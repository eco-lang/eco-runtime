  name: If Expressions
  patterns:
    - name: Simple if
      elm_source: |
        module Test exposing (testValue)
        testValue = if True then 1 else 0
    - name: If with fuzzed condition
      elm_source: |
        module Test exposing (testValue)
        testValue = if b then 1 else 0  -- fuzzed bool
    - name: If with fuzzed branches
      elm_source: |
        module Test exposing (testValue)
        testValue = if True then a else b  -- fuzzed int values
    - name: If returning tuples
      elm_source: |
        module Test exposing (testValue)
        testValue = if True then (1, 2) else (3, 4)
    - name: If returning lists
      elm_source: |
        module Test exposing (testValue)
        testValue = if False then [1, 2] else []
    - name: Nested if
      elm_source: |
        module Test exposing (testValue)
        testValue = if True then (if True then 1 else 2) else 0
    - name: If in else branch
      elm_source: |
        module Test exposing (testValue)
        testValue = if False then 1 else (if True then 2 else 3)
    - name: Deeply nested if
      elm_source: |
        module Test exposing (testValue)
        testValue = if True then 1 else (if True then 2 else (if True then 3 else 4))
    - name: If with variable condition
      elm_source: |
        module Test exposing (testValue)
        testValue =
            let cond = True
            in if cond then 1 else 0
    - name: If with all fuzzed values
      elm_source: |
        module Test exposing (testValue)
        testValue = if cond then thenVal else elseVal  -- all fuzzed

