- source_file: compiler/tests/Compiler/ArrayTest.elm
  category: Array Type Variable Scoping
  name: Real-World Library Function Patterns
  patterns:
    - name: repeat function
      elm_source: |
        repeat : Int -> a -> Array a
        repeat n e =
            initialize n (\_ -> e)
    - name: push function
      elm_source: |
        push : a -> Array a -> Array a
        push a ((Array_elm_builtin _ _ _ tail) as array) =
            unsafeReplaceTail (JsArray.push a tail) array
    - name: slice function
      elm_source: |
        slice : Int -> Int -> Array a -> Array a
        slice from to array =
            let
                correctFrom = translateIndex from array
                correctTo = translateIndex to array
            in
            if correctFrom > correctTo then
                empty
            else
                array
                    |> sliceRight correctTo
                    |> sliceLeft correctFrom
