- source_file: compiler/tests/Compiler/TypeCheckFails.elm
  category: Type Checking - Edge Cases
  name: Type Checking Challenge Patterns
  patterns:
    - name: Alias everywhere
      elm_source: |
        module Test exposing (allAliased)
        allAliased ((a@first, b@second))@whole = [whole, first, second]
    - name: Multiple aliases in recursive function
      elm_source: |
        module Test exposing (go)
        go (n@count) (acc@result) = if True then result else go 0 count
    - name: Case on unit
      elm_source: |
        module Test exposing (testValue)
        testValue =
            case (1, 1) of
                () -> 0
    - name: Case on fuzzed int
      elm_source: |
        module Test exposing (testValue)
        testValue =
            case n of  -- fuzzed
                0 -> "zero"
                x -> x  -- Type mismatch expected
    - name: All expression types in one module
      elm_source: |
        module Test exposing (..)
        -- Complex module combining literals, containers,
        -- functions, control flow, operators, and records
    - name: Fold-like function
      elm_source: |
        module Test exposing (myFold)
        myFold f init list =
            case list of
                [] -> init
                h :: t -> f h init
    - name: Multiple aliases in destruct
      elm_source: |
        module Test exposing (testValue)
        testValue =
            let ((a@first, b@second))@whole = (1, 2)
            in [whole, first, second, a, b]
    - name: Deeply recursive function
      elm_source: |
        module Test exposing (countdown)
        countdown n =
            case n of
                0 -> []
                x -> [x, countdown 0]
    - name: Mutually recursive different types
      elm_source: |
        module Test exposing (toList, toInt)
        toList n = if True then [] else [toInt 0]
        toInt xs =
            case xs of
                [] -> 0
                _ -> 1
    - name: Recursive with record pattern
      elm_source: |
        module Test exposing (getValue)
        getValue { value, next } = if True then value else getValue next
    - name: Recursive higher order
      elm_source: |
        module Test exposing (map)
        map f list =
            case list of
                [] -> []
                h :: t -> [f h, map f t]
    - name: Update with computed value
      elm_source: |
        module Test exposing (testValue)
        testValue =
            let
                r = { value = 10 }
                newValue = (1, 2)
            in
            { r | value = newValue }

