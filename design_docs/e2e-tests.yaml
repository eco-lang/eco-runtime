# E2E Test Patterns Report
# Source: /work/test/elm/src/
#
# These tests use standalone Elm modules with:
# - Module declarations exposing main
# - CHECK comments for expected output validation
# - Debug.log for actual output
#
# Test structure pattern:
#   module XxxTest exposing (main)
#   -- CHECK: name: expectedValue
#   main = let _ = Debug.log "name" (expression) in text "done"

---

# =============================================================================
# INTEGER ARITHMETIC
# =============================================================================

- source_file: IntAddTest.elm
  category: Integer Arithmetic
  name: Integer Addition
  patterns:
    - name: add1_positive_addition
      elm_source: |
        10 + 3
      expected: "13"
    - name: add2_opposite_values
      elm_source: |
        5 + -5
      expected: "0"
    - name: add3_negative_addition
      elm_source: |
        -2 + -3
      expected: "-5"

- source_file: IntSubTest.elm
  category: Integer Arithmetic
  name: Integer Subtraction
  patterns:
    - name: sub1_positive_subtraction
      elm_source: |
        10 - 3
      expected: "7"
    - name: sub2_subtract_negative
      elm_source: |
        5 - -5
      expected: "10"
    - name: sub3_negative_subtraction
      elm_source: |
        -2 - -3
      expected: "1"

- source_file: IntMulTest.elm
  category: Integer Arithmetic
  name: Integer Multiplication
  patterns:
    - name: mul1_positive_multiplication
      elm_source: |
        10 * 3
      expected: "30"
    - name: mul2_mixed_sign
      elm_source: |
        5 * -3
      expected: "-15"
    - name: mul3_negative_multiplication
      elm_source: |
        -2 * -3
      expected: "6"
    - name: mul4_multiply_by_zero
      elm_source: |
        0 * 100
      expected: "0"

- source_file: IntDivTest.elm
  category: Integer Arithmetic
  name: Integer Division
  patterns:
    - name: div1_positive_division
      elm_source: |
        10 // 3
      expected: "3"
    - name: div2_negative_dividend
      elm_source: |
        -10 // 3
      expected: "-3"
    - name: div3_negative_divisor
      elm_source: |
        10 // -3
      expected: "-3"
    - name: div4_both_negative
      elm_source: |
        -10 // -3
      expected: "3"

- source_file: IntModByTest.elm
  category: Integer Arithmetic
  name: Integer Modulo (floored division)
  patterns:
    - name: mod1_basic_modulo
      elm_source: |
        modBy 4 7
      expected: "3"
    - name: mod2_negative_dividend
      elm_source: |
        modBy 4 -7
      expected: "1"
    - name: mod5_zero_dividend
      elm_source: |
        modBy 5 0
      expected: "0"

- source_file: IntRemainderByTest.elm
  category: Integer Arithmetic
  name: Integer Remainder (truncated division)
  patterns:
    - name: rem1_basic_remainder
      elm_source: |
        remainderBy 4 7
      expected: "3"
    - name: rem2_negative_dividend
      elm_source: |
        remainderBy 4 -7
      expected: "-3"
    - name: rem3_negative_divisor
      elm_source: |
        remainderBy -4 7
      expected: "3"
    - name: rem4_both_negative
      elm_source: |
        remainderBy -4 -7
      expected: "-3"

- source_file: IntAbsTest.elm
  category: Integer Arithmetic
  name: Integer Absolute Value
  patterns:
    - name: abs1_positive
      elm_source: |
        abs 5
      expected: "5"
    - name: abs2_negative
      elm_source: |
        abs -5
      expected: "5"
    - name: abs3_zero
      elm_source: |
        abs 0
      expected: "0"

- source_file: IntNegateTest.elm
  category: Integer Arithmetic
  name: Integer Negation
  patterns:
