# =============================================================================
# RECURSION
# =============================================================================

- source_file: RecursiveFactorialTest.elm
  category: Recursion
  name: Simple Recursion (Factorial)
  patterns:
    - name: factorial_recursion
      elm_source: |
        factorial n =
            if n <= 1 then
                1
            else
                n * factorial (n - 1)
      expected: "Recursive factorial function"

- source_file: RecursiveFibonacciTest.elm
  category: Recursion
  name: Multiple Recursive Calls (Fibonacci)
  patterns:
    - name: fibonacci_recursion
      elm_source: |
        fib n =
            if n <= 0 then
                0
            else if n == 1 then
                1
            else
                fib (n - 1) + fib (n - 2)
      expected: "Recursive fibonacci function"

- source_file: RecursiveListLengthTest.elm
  category: Recursion
  name: Recursive List Traversal
  patterns:
    - name: list_length_recursion
      elm_source: |
        myLength list =
            case list of
                [] -> 0
                _ :: rest -> 1 + myLength rest
      expected: "Recursive list length function"

- source_file: TailRecursiveSumTest.elm
  category: Recursion
  name: Tail Recursion with Accumulator
  patterns:
    - name: tail_recursive_sum
      elm_source: |
        sumHelper n acc =
            if n <= 0 then
                acc
            else
                sumHelper (n - 1) (acc + n)

        sumTo n = sumHelper n 0
      expected: "Tail recursive sum function"

- source_file: MutualRecursionTest.elm
  category: Recursion
  name: Mutually Recursive Functions
  patterns:
    - name: mutual_recursion
      elm_source: |
        isEven n =
            if n == 0 then
                True
            else
                isOdd (n - 1)

        isOdd n =
            if n == 0 then
                False
            else
                isEven (n - 1)
      expected: "Mutually recursive even/odd functions"

