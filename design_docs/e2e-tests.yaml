      expected: "Infinity"
    - name: div2_negative_infinity_from_neg_zero
      elm_source: |
        1.0 / -0.0
      expected: "-Infinity"

# =============================================================================
# BITWISE OPERATIONS
# =============================================================================

- source_file: BitwiseAndTest.elm
  category: Bitwise Operations
  name: Bitwise AND
  patterns:
    - name: and_basic_overlap
      elm_source: |
        Bitwise.and 15 8
      expected: "8"
    - name: and_no_overlap
      elm_source: |
        Bitwise.and 15 16
      expected: "0"
    - name: and_same_value
      elm_source: |
        Bitwise.and 15 15
      expected: "15"

- source_file: BitwiseOrTest.elm
  category: Bitwise Operations
  name: Bitwise OR
  patterns:
    - name: or_basic_combine
      elm_source: |
        Bitwise.or 15 8
      expected: "15"
    - name: or_different_bits
      elm_source: |
        Bitwise.or 15 16
      expected: "31"
    - name: or_same_value
      elm_source: |
        Bitwise.or 15 15
      expected: "15"

- source_file: BitwiseXorTest.elm
  category: Bitwise Operations
  name: Bitwise XOR
  patterns:
    - name: xor_different_bits
      elm_source: |
        Bitwise.xor 15 8
      expected: "7"
    - name: xor_disjoint_sets
      elm_source: |
        Bitwise.xor 15 16
      expected: "31"
    - name: xor_same_value
      elm_source: |
        Bitwise.xor 15 15
      expected: "0"

- source_file: BitwiseComplementTest.elm
  category: Bitwise Operations
  name: Bitwise Complement
  patterns:
    - name: complement_zero
      elm_source: |
        Bitwise.complement 0
      expected: "-1"
    - name: complement_positive
      elm_source: |
        Bitwise.complement 15
      expected: "-16"

- source_file: BitwiseIdentityTest.elm
  category: Bitwise Operations
  name: Bitwise Identity Properties
  patterns:
    - name: identity_and_self
      elm_source: |
        let x = 42 in Bitwise.and x x
      expected: "42"
    - name: identity_or_self
      elm_source: |
        let x = 42 in Bitwise.or x x
      expected: "42"
    - name: identity_xor_self
      elm_source: |
        let x = 42 in Bitwise.xor x x
      expected: "0"

- source_file: BitwiseShiftLeftTest.elm
  category: Bitwise Operations
  name: Bitwise Shift Left
  patterns:
    - name: shift_left_4bits
      elm_source: |
        Bitwise.shiftLeftBy 4 1
      expected: "16"
    - name: shift_left_1bit
      elm_source: |
        Bitwise.shiftLeftBy 1 16
      expected: "32"
    - name: shift_left_10bits
      elm_source: |
        Bitwise.shiftLeftBy 10 1
      expected: "1024"

- source_file: BitwiseShiftRightTest.elm
  category: Bitwise Operations
  name: Bitwise Shift Right (arithmetic)
  patterns:
    - name: shift_right_arithmetic_4bits
      elm_source: |
        Bitwise.shiftRightBy 4 16
      expected: "1"
    - name: shift_right_arithmetic_1bit
      elm_source: |
        Bitwise.shiftRightBy 1 16
      expected: "8"
    - name: shift_right_arithmetic_negative
      elm_source: |
        Bitwise.shiftRightBy 4 -1
      expected: "-1"

- source_file: BitwiseShiftRightZfTest.elm
  category: Bitwise Operations
  name: Bitwise Shift Right Zero Fill
  patterns:
    - name: shift_right_zero_fill_4bits
      elm_source: |
        Bitwise.shiftRightZfBy 4 16
      expected: "1"
    - name: shift_right_zero_fill_1bit
      elm_source: |
