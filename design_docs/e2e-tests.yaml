      expected: "True"
    - name: le1_less_or_equal
      elm_source: |
        3 <= 10
      expected: "True"
    - name: le2_equal_case
      elm_source: |
        5 <= 5
      expected: "True"
    - name: ge1_greater_or_equal
      elm_source: |
        10 >= 3
      expected: "True"
    - name: ge2_equal_case
      elm_source: |
        5 >= 5
      expected: "True"
    - name: eq_equality
      elm_source: |
        5 == 5
      expected: "True"
    - name: ne_inequality
      elm_source: |
        5 /= 3
      expected: "True"

